name: generate animation
on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
      - main   # match this to your repo's actual default branch

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: generate spiderverse snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?color_snake=#f5f5f5&color_dots=#12172a,#1b3f8b,#3b5bab,#c62f2f,#ff4d4d
            dist/github-snake-light.svg?color_snake=#0a0e17&color_dots=#e9ecf5,#1b3f8b,#3b5bab,#c62f2f,#ff4d4d
      - name: push snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
