<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 200" width="450" height="200">
  <defs>
    <!-- Web gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e23636"/>
      <stop offset="100%" stop-color="#1b3f8b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .card-bg { fill: #0a0e17; stroke: url(#borderGrad); stroke-width: 1.5; }
    .title { fill: #ff4d4d; font-family: sans-serif; font-weight: 800; font-size: 16px; letter-spacing: 0.5; }
    .label { fill: #f5f5f5; font-family: sans-serif; font-weight: bold; font-size: 13px; }
    .value { fill: #f4c542; font-family: monospace; font-weight: bold; font-size: 14px; }
    .web-corner { stroke: #e23636; stroke-width: 0.8; opacity: 0.2; fill: none; }
    
    /* Animations */
    .row-g {
      animation: slideIn 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }
    @keyframes slideIn {
      0% { transform: translateX(50px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
  </style>

  <!-- Card Background -->
  <rect class="card-bg" x="2" y="2" width="446" height="196" rx="10"/>

  <!-- Web doodles in corners -->
  <path class="web-corner" d="M 2 2 L 0 50 M 2 2 L 50 0 M 2 2 L 35 35 M 448 2 L 448 50 M 448 2 L 398 0 M 448 2 L 413 35 M 2 198 L 0 148 M 2 198 L 50 200 M 2 198 L 35 163 M 448 198 L 448 148 M 448 198 L 398 200 M 448 198 L 413 163"/>

  <!-- Title -->
  <text x="30" y="35" class="title">SPIDER-STATUS</text>

  <!-- Left: Animated Rank Circle -->
  <g transform="translate(80, 115)">
    <!-- Back ring -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="#1b3f8b" stroke-width="7" opacity="0.2"/>
    <!-- Front progress ring -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="#e23636" stroke-width="7" stroke-dasharray="283" stroke-dashoffset="283" filter="url(#glow)">
      <animate attributeName="stroke-dashoffset" from="283" to="42" dur="1.8s" fill="freeze" begin="0.2s"/>
    </circle>
    <!-- Rank text S -->
    <text x="0" y="11" fill="#f4c542" font-family="sans-serif" font-weight="900" font-size="34" text-anchor="middle" filter="drop-shadow(0 0 3px #f4c542)">S</text>
    <text x="0" y="26" fill="#ff4d4d" font-family="sans-serif" font-weight="bold" font-size="9" text-anchor="middle">RANK</text>
  </g>

  <!-- Right: Stats Rows (staggered delay) -->
  <!-- Commits -->
  <g class="row-g" style="animation-delay: 0.1s;">
    <text x="180" y="65" class="label">Total Commits:</text>
    <text x="390" y="65" class="value" text-anchor="end">1,240</text>
    <line x1="180" y1="72" x2="390" y2="72" stroke="#1b3f8b" stroke-width="1" opacity="0.2"/>
  </g>
  <!-- PRs -->
  <g class="row-g" style="animation-delay: 0.2s;">
    <text x="180" y="95" class="label">Pull Requests:</text>
    <text x="390" y="95" class="value" text-anchor="end">35</text>
    <line x1="180" y1="102" x2="390" y2="102" stroke="#1b3f8b" stroke-width="1" opacity="0.2"/>
  </g>
  <!-- Issues -->
  <g class="row-g" style="animation-delay: 0.3s;">
    <text x="180" y="125" class="label">Closed Issues:</text>
    <text x="390" y="125" class="value" text-anchor="end">12</text>
    <line x1="180" y1="132" x2="390" y2="132" stroke="#1b3f8b" stroke-width="1" opacity="0.2"/>
  </g>
  <!-- Stars -->
  <g class="row-g" style="animation-delay: 0.4s;">
    <text x="180" y="155" class="label">Stars Earned:</text>
    <text x="390" y="155" class="value" text-anchor="end">8</text>
    <line x1="180" y1="162" x2="390" y2="162" stroke="#1b3f8b" stroke-width="1" opacity="0.2"/>
  </g>
</svg>